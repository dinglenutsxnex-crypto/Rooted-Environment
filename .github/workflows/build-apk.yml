name: Build Signed APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ubuntu-latest already ships Android SDK — no setup-android action needed
      # (android-actions/setup-android sets JAVA_TOOL_OPTIONS=-Xmx64m which breaks gradlew)

      # Gradle wrapper JAR cannot be stored as text — download the official one
      - name: Bootstrap Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # ── DEBUG ───────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew :app:assembleDebug --no-daemon
        env:
          JAVA_TOOL_OPTIONS: ""

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootdroid-debug-${{ github.sha }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── RELEASE ─────────────────────────────────────────────────────────
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          JAVA_TOOL_OPTIONS: ""
          KEYSTORE_PATH: ${{ github.workspace }}/android-app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode keystore & sign APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          APKSIGNER="$(find "$ANDROID_SDK_ROOT" -name apksigner | grep -v jar | head -1)"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk

          ZIPALIGN="$(find "$ANDROID_SDK_ROOT" -name zipalign | head -1)"
          "$ZIPALIGN" -v 4 "$UNSIGNED" app/build/outputs/apk/release/app-release-aligned.apk

          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out app/build/outputs/apk/release/rootdroid-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          "$APKSIGNER" verify --verbose app/build/outputs/apk/release/rootdroid-signed.apk

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootdroid-release-${{ github.sha }}
          path: |
            android-app/app/build/outputs/apk/release/rootdroid-signed.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
          retention-days: 90

      # ── Tag → GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/release/rootdroid-signed.apk
            android-app/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
